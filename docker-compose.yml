# Local Postgres + pgvector for long-term memory (used from Phase 2).
# Start with:  docker compose up -d
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: companion-db
    environment:
      POSTGRES_USER: companion
      POSTGRES_PASSWORD: companion
      POSTGRES_DB: companion
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companion -d companion"]
      interval: 10s
      timeout: 5s
      retries: 5
